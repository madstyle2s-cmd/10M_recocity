<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Debt Recovery & Portfolio Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-100 text-slate-800">

  <!-- Header -->
  <header class="bg-blue-900 text-white p-4 sticky top-0 z-50 flex justify-between items-center">
    <h1 class="text-lg md:text-xl font-bold">Debt Recovery & Portfolio Management</h1>
  </header>

  <!-- Dashboard -->
  <section id="dashboardView" class="p-4">
    <!-- KPI Cards -->
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 mb-4">
      <div class="bg-white shadow rounded p-4"><h2 class="text-sm text-slate-500">Total Portfolio Value</h2><p id="kpiPortfolio" class="text-xl md:text-2xl font-bold text-blue-900">$0</p></div>
      <div class="bg-white shadow rounded p-4"><h2 class="text-sm text-slate-500">Active Case Count</h2><p id="kpiCases" class="text-xl md:text-2xl font-bold text-blue-900">0</p></div>
      <div class="bg-white shadow rounded p-4"><h2 class="text-sm text-slate-500">Recovery Progress</h2><p id="kpiRecovery" class="text-xl md:text-2xl font-bold text-blue-900">0%</p></div>
      <div class="bg-white shadow rounded p-4"><h2 class="text-sm text-slate-500">Contactability Ratio</h2><p id="kpiContact" class="text-xl md:text-2xl font-bold text-blue-900">0%</p></div>
    </div>

    <!-- Search & Filters -->
    <div class="flex flex-wrap gap-2 mb-4">
      <input type="text" id="searchInput" placeholder="Search by name or phone..." class="border rounded p-2 flex-1">
      <button id="searchBtn" class="bg-blue-900 text-white px-3 py-2 rounded">Search</button>
      <button id="clearBtn" class="bg-slate-500 text-white px-3 py-2 rounded">Clear</button>
      <select id="sortSelect" class="border rounded p-2">
        <option value="">Sort by...</option>
        <option value="Outstanding">Outstanding</option>
        <option value="PayOff">Pay Off</option>
        <option value="CardType">Card Type</option>
      </select>
      <select id="supervisorSelect" class="border rounded p-2">
        <option value="">Filter by Supervisor...</option>
      </select>
    </div>

    <!-- Card Grid -->
    <div id="card-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>

    <!-- Pagination -->
    <div class="flex justify-center items-center mt-4 space-x-4">
      <button id="prevBtn" class="bg-blue-900 text-white px-3 py-2 rounded">Previous</button>
      <span id="pageInfo"></span>
      <button id="nextBtn" class="bg-blue-900 text-white px-3 py-2 rounded">Next</button>
    </div>
  </section>

  <!-- Profile Modal -->
  <div id="detailModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded shadow p-6 w-11/12 md:w-2/3 max-h-[80vh] overflow-y-auto">
      <span id="closeModal" class="material-icons float-right cursor-pointer">close</span>
      <h2 id="detailTitle" class="text-lg md:text-xl font-bold mb-4"></h2>
      <div id="detailBody" class="space-y-2"></div>

      <!-- Editor -->
      <div class="mt-4">
        <label class="block mb-2 text-sm font-bold">Remarks</label>
        <input type="text" id="modalRemarks" class="border rounded p-2 w-full">
        <label class="block mt-4 mb-2 text-sm font-bold">Paid</label>
        <input type="number" id="modalPaid" class="border rounded p-2 w-full">
        <button id="saveBtn" class="bg-blue-900 text-white px-4 py-2 rounded mt-4 w-full">Save</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
